<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>armedcivil-site</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface-hover: #1e1e24;
      --border: #2a2a35;
      --accent: #7c6af7;
      --accent-glow: rgba(124, 106, 247, 0.25);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #555568;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .subtitle {
      margin-top: 12px;
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin: 24px auto 0;
      opacity: 0.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }

    .card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .card:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 14px;
      display: block;
    }

    .card-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .card-arrow {
      position: absolute;
      top: 24px;
      right: 24px;
      color: var(--text-muted);
      font-size: 16px;
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translate(2px, -2px);
    }

    footer {
      margin-top: 64px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <p class="logo">armedcivil</p>
    <h1>My Services</h1>
    <p class="subtitle">自作サービスの一覧です</p>
    <div class="divider"></div>
  </header>

  <main class="grid">

    <a href="#" class="card">
      <span class="card-icon">🚀</span>
      <span class="card-arrow">↗</span>
      <p class="card-name">Service 1</p>
      <p class="card-desc">サービスの説明をここに書きます。</p>
    </a>

    <a href="#" class="card">
      <span class="card-icon">🛠️</span>
      <span class="card-arrow">↗</span>
      <p class="card-name">Service 2</p>
      <p class="card-desc">サービスの説明をここに書きます。</p>
    </a>

    <a href="#" class="card">
      <span class="card-icon">📦</span>
      <span class="card-arrow">↗</span>
      <p class="card-name">Service 3</p>
      <p class="card-desc">サービスの説明をここに書きます。</p>
    </a>

    <a href="#" class="card">
      <span class="card-icon">✨</span>
      <span class="card-arrow">↗</span>
      <p class="card-name">Service 4</p>
      <p class="card-desc">サービスの説明をここに書きます。</p>
    </a>

  </main>

  <footer>
    <p>© 2026 armedcivil</p>
  </footer>

</body>
</html>
